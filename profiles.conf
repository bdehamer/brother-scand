# Brother Scanner Configuration
#
# [scanner] section defines connection and output settings.
# Each [button.N] section defines the scan profile for button N.
# The [default] section is used for any unmapped button number.
#
# Available profile options:
#   name    - Display name for logging
#   reso    - Resolution (e.g. 300,300 or 600,600)
#   color   - Color mode: C24BIT (color) or CGRAY (grayscale)
#   duplex  - Duplex mode: ON or OFF
#   crop    - Crop mode: tight (trim gray+white) or gray_only (trim scanner gray only)
#   output  - Output format: pdf or jpeg

[scanner]
ip = 192.168.4.158
hostname = rosie
output_dir = ~/scans

[button.1]
name = Duplex Color PDF
reso = 300,300
color = C24BIT
duplex = ON
crop = gray_only
output = pdf

[button.2]
name = Duplex B&W PDF
reso = 300,300
color = CGRAY
duplex = ON
crop = gray_only
output = pdf

[button.3]
name = Simplex Color HiRes JPEG
reso = 600,600
color = C24BIT
duplex = OFF
crop = tight
output = jpeg

[default]
name = Duplex Color PDF
reso = 300,300
color = C24BIT
duplex = ON
crop = gray_only
output = pdf
